name: Generate EPG

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC = 5 AM CET / 4 AM CEST
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Generate EPG
        run: |
          mkdir dist
          uv run NeoEpgGrabber.py --ids channel_ids.txt --output dist/epg.xmltv
          cp neo.m3u dist/neo.m3u

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

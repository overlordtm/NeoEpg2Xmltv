name: Generate EPG

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC = 5 AM CET / 4 AM CEST
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Generate EPG
        run: uv run NeoEpgGrabber.py --ids channel_ids.txt --output epg.xmltv

      - name: Publish to gh-pages
        run: |
          mkdir deploy
          cp epg.xmltv deploy/
          cd deploy
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add epg.xmltv
          git commit -m "EPG update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            HEAD:gh-pages
